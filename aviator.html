<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aviator — VériBed</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0e12;
  --panel:#16161d;
  --card:#1c1c26;
  --border:#2a2a3a;
  --red:#e03131;
  --green:#2ecc71;
  --blue:#4dabf7;
  --gold:#ffd43b;
  --text:#e8e8f0;
  --muted:#6b6b80;
  --font:'Montserrat',sans-serif;
  --rajdhani:'Rajdhani',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;touch-action:manipulation}
body{display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.header-left{display:flex;align-items:center;gap:8px}
.back-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;line-height:1}
.logo{font-family:var(--rajdhani);font-size:20px;font-weight:700;color:#fff;letter-spacing:1px}
.logo span{color:var(--red)}
.balance-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:13px;font-weight:700;color:var(--gold)}

/* HISTORY BAR */
.history-bar{display:flex;align-items:center;gap:5px;padding:7px 12px;background:var(--panel);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.history-bar::-webkit-scrollbar{display:none}
.hist-pill{font-family:var(--rajdhani);font-size:12px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.hist-blue{background:rgba(77,171,247,.18);color:var(--blue)}
.hist-purple{background:rgba(150,100,255,.18);color:#c77dff}
.hist-pink{background:rgba(255,100,180,.2);color:#ff85c8}
.hist-red{background:rgba(224,49,49,.2);color:var(--red)}

/* GAME AREA */
.game-area{position:relative;flex:0 0 240px;background:linear-gradient(180deg,#0a0a10 0%,#0e0e1a 100%);overflow:hidden}
canvas{display:block;width:100%;height:100%}
.multiplier-display{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none;transition:opacity .3s}
.mult-value{font-family:var(--rajdhani);font-size:58px;font-weight:700;line-height:1;text-shadow:0 0 30px currentColor}
.mult-label{font-size:11px;color:var(--muted);letter-spacing:2px;margin-top:2px;text-transform:uppercase}
.crash-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,16,.85);opacity:0;pointer-events:none;transition:opacity .4s}
.crash-overlay.show{opacity:1}
.crash-text{font-family:var(--rajdhani);font-size:20px;font-weight:700;color:var(--muted);letter-spacing:3px;text-transform:uppercase}
.crash-value{font-family:var(--rajdhani);font-size:52px;font-weight:700;color:var(--red);text-shadow:0 0 20px rgba(224,49,49,.6);line-height:1}
.crash-sub{font-size:11px;color:var(--muted);margin-top:4px}
.waiting-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,16,.9);transition:opacity .3s}
.waiting-overlay.hide{opacity:0;pointer-events:none}
.wait-label{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.wait-timer{font-family:var(--rajdhani);font-size:42px;font-weight:700;color:#fff}
.wait-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* BETS PANEL */
.bets-panel{flex:1;overflow-y:auto;background:var(--panel);padding:10px 12px 12px;display:flex;flex-direction:column;gap:10px}
.bets-panel::-webkit-scrollbar{display:none}
.bet-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px}
.bet-tabs{display:flex;gap:0;margin-bottom:10px;background:var(--bg);border-radius:8px;padding:3px}
.bet-tab{flex:1;padding:5px;text-align:center;font-size:12px;font-weight:600;border-radius:6px;cursor:pointer;color:var(--muted);border:none;background:none;transition:.2s}
.bet-tab.active{background:var(--panel);color:#fff}
.bet-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bet-input-wrap{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;flex:1}
.bet-btn{background:none;border:none;color:var(--muted);font-size:18px;padding:0 10px;height:36px;cursor:pointer;font-weight:700;transition:.15s}
.bet-btn:active{color:#fff}
.bet-input{flex:1;background:none;border:none;color:#fff;font-family:var(--rajdhani);font-size:17px;font-weight:700;text-align:center;width:0;outline:none}
.quick-bets{display:flex;gap:5px;margin-bottom:10px}
.quick-bet{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 0;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;transition:.15s;font-family:var(--rajdhani)}
.quick-bet:active{border-color:var(--blue);color:var(--blue)}
.cashout-target-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.cashout-target-row label{font-size:11px;color:var(--muted);white-space:nowrap}
.cashout-toggle{position:relative;width:36px;height:20px;flex-shrink:0}
.cashout-toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:20px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:'';position:absolute;left:2px;top:2px;width:16px;height:16px;background:#fff;border-radius:50%;transition:.2s}
.cashout-toggle input:checked+.toggle-slider{background:#2ecc71}
.cashout-toggle input:checked+.toggle-slider:before{transform:translateX(16px)}
.auto-cashout-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:5px 8px;color:#fff;font-family:var(--rajdhani);font-size:14px;font-weight:700;text-align:center;outline:none;width:60px}
.main-bet-btn{width:100%;padding:13px;border-radius:10px;font-family:var(--rajdhani);font-size:18px;font-weight:700;letter-spacing:.5px;border:none;cursor:pointer;transition:.15s;text-transform:uppercase}
.main-bet-btn.bet{background:var(--green);color:#fff}
.main-bet-btn.bet:active{filter:brightness(.9)}
.main-bet-btn.cashout{background:linear-gradient(135deg,#f7b731,#e03131);color:#fff;animation:pulse-btn 1s infinite}
.main-bet-btn.waiting{background:var(--red);color:#fff;opacity:.7;cursor:not-allowed}
.main-bet-btn.cancel{background:var(--border);color:var(--muted)}
@keyframes pulse-btn{0%,100%{box-shadow:0 0 0 0 rgba(247,183,49,.4)}50%{box-shadow:0 0 0 8px rgba(247,183,49,0)}}
.btn-sub{font-size:11px;font-weight:400;opacity:.8;display:block;margin-top:1px}

/* BOTTOM TABS */
.bottom-nav{display:flex;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0}
.nav-tab{flex:1;padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--muted);font-size:10px;font-weight:600;border:none;background:none;transition:.15s;letter-spacing:.5px}
.nav-tab.active{color:var(--text)}
.nav-tab svg{width:18px;height:18px}

/* PANELS */
.bottom-panel{position:absolute;inset:0;background:var(--bg);z-index:20;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.bottom-panel.open{transform:translateY(0)}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-title{font-family:var(--rajdhani);font-size:18px;font-weight:700;letter-spacing:1px}
.close-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
.panel-body{flex:1;overflow-y:auto;padding:12px 14px}
.panel-body::-webkit-scrollbar{width:3px}
.panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* RANKING TABLE */
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--card);border-radius:10px;margin-bottom:8px;border:1px solid var(--border)}
.rank-pos{font-family:var(--rajdhani);font-size:20px;font-weight:700;color:var(--muted);width:28px;text-align:center}
.rank-pos.gold{color:var(--gold)}
.rank-pos.silver{color:#adb5bd}
.rank-pos.bronze{color:#cd7f32}
.rank-name{font-family:var(--rajdhani);font-size:16px;font-weight:700;flex:1;letter-spacing:1px}
.rank-val{text-align:right}
.rank-mult{font-family:var(--rajdhani);font-size:14px;color:var(--muted)}
.rank-amount{font-family:var(--rajdhani);font-size:17px;font-weight:700;color:var(--gold)}
.empty-rank{text-align:center;color:var(--muted);font-size:13px;padding:40px 0}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:var(--panel);border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:480px}
.modal h3{font-family:var(--rajdhani);font-size:22px;font-weight:700;text-align:center;margin-bottom:6px;color:var(--gold)}
.modal p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px}
.modal input{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:10px;padding:12px;color:#fff;font-family:var(--rajdhani);font-size:28px;font-weight:700;text-align:center;outline:none;letter-spacing:6px;text-transform:uppercase;margin-bottom:16px}
.modal input:focus{border-color:var(--gold)}
.modal-btn{width:100%;padding:14px;background:var(--gold);color:#000;border:none;border-radius:10px;font-family:var(--rajdhani);font-size:18px;font-weight:700;cursor:pointer;letter-spacing:1px}

/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-size:13px;font-weight:600;opacity:0;transition:.3s;z-index:200;white-space:nowrap;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.win{border-color:var(--green);color:var(--green)}
.toast.loss{border-color:var(--red);color:var(--red)}

/* Stars bg */
.stars{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.star{position:absolute;background:#fff;border-radius:50%;opacity:.5;animation:twinkle 3s infinite alternate}
@keyframes twinkle{0%{opacity:.2}100%{opacity:.7}}
</style>
</head>

<script>
// ===================== STATE =====================
let balance = parseFloat(localStorage.getItem('av_balance') || '1000');
const lastReset = localStorage.getItem('av_reset_date');
const today = new Date().toDateString();
if(lastReset !== today){ balance = 1000; localStorage.setItem('av_reset_date', today); }

let gameState = 'waiting'; // waiting | flying | crashed
let currentMult = 1.0;
let crashPoint = 1.0;
let waitCountdown = 5;
let waitInterval = null;
let flyInterval = null;
let startTime = 0;
let roundHistory = [];
let myHistory = [];

// Bets: {active: bool, amount: num, cashedOut: bool, autoTarget: num|null, pendingBet: num|null}
let bets = {
  1: {active:false, amount:0, cashedOut:false, autoTarget:null, pendingBet:null},
  2: {active:false, amount:0, cashedOut:false, autoTarget:null, pendingBet:null}
};

// ===================== CANVAS =====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const gameArea = document.getElementById('gameArea');

function resizeCanvas(){
  canvas.width = gameArea.offsetWidth;
  canvas.height = gameArea.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Generate stars
(function genStars(){
  const c = document.getElementById('starsContainer');
  for(let i=0;i<40;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `width:${1+Math.random()*2}px;height:${1+Math.random()*2}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
    c.appendChild(s);
  }
})();

function getMultColor(m){
  if(m < 2) return '#4dabf7';
  if(m < 10) return '#c77dff';
  if(m < 100) return '#ff85c8';
  return '#e03131';
}

let planeX = 0, planeY = 0;

function drawGame(){
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  if(gameState === 'waiting'){ return; }

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for(let i=0;i<6;i++){
    const y = H - (H/5)*i;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Curve
  const elapsed = (Date.now() - startTime) / 1000;
  const progress = Math.min(elapsed / 15, 1);
  const pts = [];
  const steps = 60;
  for(let i=0;i<=steps;i++){
    const t = (i/steps) * progress;
    const m = Math.pow(Math.E, t * 2);
    const x = (i/steps) * W * 0.9 + W*0.05;
    const y = H - 0.1*H - (m - 1) / (currentMult - 1 + 0.001) * (H * 0.75);
    pts.push({x, y});
  }

  if(pts.length > 1){
    // Gradient fill under curve
    const grad = ctx.createLinearGradient(0, H, 0, pts[pts.length-1].y);
    const col = getMultColor(currentMult);
    grad.addColorStop(0, col.replace('#','rgba(').split('rgba(')[1] ? col : col + '18');
    grad.addColorStop(0, `${col}22`);
    grad.addColorStop(1, `${col}00`);
    ctx.beginPath();
    ctx.moveTo(pts[0].x, H);
    pts.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.lineTo(pts[pts.length-1].x, H);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Curve line
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    pts.forEach(p => ctx.lineTo(p.x, p.y));
    ctx.strokeStyle = getMultColor(currentMult);
    ctx.lineWidth = 2.5;
    ctx.shadowColor = getMultColor(currentMult);
    ctx.shadowBlur = 8;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Plane at end of curve
    const last = pts[pts.length-1];
    const prev = pts[pts.length-2] || pts[0];
    const angle = Math.atan2(last.y - prev.y, last.x - prev.x);
    planeX = last.x;
    planeY = last.y;

    ctx.save();
    ctx.translate(last.x, last.y);
    ctx.rotate(angle - 0.3);
    ctx.font = '22px serif';
    ctx.fillText('✈', -11, 7);
    ctx.restore();
  }
}

// ===================== GAME LOOP =====================
function generateCrashPoint(){
  // House edge ~5%, mostly crashes 1-3x but occasional big ones
  const r = Math.random();
  if(r < 0.45) return 1 + Math.random() * 0.8;
  if(r < 0.72) return 1.8 + Math.random() * 1.5;
  if(r < 0.88) return 3.3 + Math.random() * 5;
  if(r < 0.96) return 8 + Math.random() * 20;
  if(r < 0.99) return 28 + Math.random() * 70;
  return 100 + Math.random() * 900;
}

function formatBRL(n){ return 'R$ ' + n.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function formatMult(m){ return m.toFixed(2) + 'x'; }

function updateBalance(){
  document.getElementById('balanceDisplay').textContent = formatBRL(balance);
  localStorage.setItem('av_balance', balance);
}

function startWaiting(){
  gameState = 'waiting';
  waitCountdown = 5;
  document.getElementById('waitingOverlay').classList.remove('hide');
  document.getElementById('crashOverlay').classList.remove('show');
  document.getElementById('multDisplay').style.opacity = '0';

  // Commit pending bets
  for(let i=1;i<=2;i++){
    if(bets[i].pendingBet !== null){
      bets[i].amount = bets[i].pendingBet;
      bets[i].pendingBet = null;
      bets[i].active = true;
      bets[i].cashedOut = false;
      setBtn(i, 'cancel');
    }
  }

  waitInterval = setInterval(()=>{
    waitCountdown--;
    document.getElementById('waitTimer').textContent = waitCountdown;
    if(waitCountdown <= 0){
      clearInterval(waitInterval);
      startFlying();
    }
  }, 1000);
}

function startFlying(){
  gameState = 'flying';
  crashPoint = generateCrashPoint();
  currentMult = 1.0;
  startTime = Date.now();
  document.getElementById('waitingOverlay').classList.add('hide');
  document.getElementById('multDisplay').style.opacity = '1';

  // Deduct bets
  for(let i=1;i<=2;i++){
    if(bets[i].active){
      balance -= bets[i].amount;
      updateBalance();
      setBtn(i, 'cashout');
    }
  }

  flyInterval = setInterval(()=>{
    const elapsed = (Date.now() - startTime) / 1000;
    currentMult = Math.pow(Math.E, elapsed * 0.22);

    // Auto cashout check
    for(let i=1;i<=2;i++){
      if(bets[i].active && !bets[i].cashedOut){
        const tog = document.getElementById('autoToggle'+i);
        if(tog.checked){
          const target = parseFloat(document.getElementById('autoCashoutVal'+i).value) || 2;
          if(currentMult >= target) doCashout(i);
        }
      }
    }

    updateMultDisplay();
    drawGame();

    if(currentMult >= crashPoint){
      doCrash();
    }
  }, 50);
}

function updateMultDisplay(){
  const v = document.getElementById('multValue');
  v.textContent = formatMult(currentMult);
  v.style.color = getMultColor(currentMult);
}

function doCashout(slot){
  if(!bets[slot].active || bets[slot].cashedOut || gameState !== 'flying') return;
  bets[slot].cashedOut = true;
  const win = bets[slot].amount * currentMult;
  balance += win;
  updateBalance();
  showToast(`✈ Retirou ${formatMult(currentMult)} — ${formatBRL(win)}!`, 'win');
  setBtn(slot, 'bet');
  bets[slot].active = false;

  // Check ranking
  checkRanking(win, currentMult, bets[slot].amount);

  myHistory.unshift({mult: currentMult, win, amount: bets[slot].amount, time: new Date().toLocaleTimeString('pt-BR')});
}

function doCrash(){
  clearInterval(flyInterval);
  gameState = 'crashed';
  document.getElementById('crashValue').textContent = formatMult(crashPoint);
  document.getElementById('crashOverlay').classList.add('show');
  document.getElementById('multDisplay').style.opacity = '0';

  // Lose active bets
  for(let i=1;i<=2;i++){
    if(bets[i].active && !bets[i].cashedOut){
      showToast(`💥 Bateu em ${formatMult(crashPoint)} — perdeu ${formatBRL(bets[i].amount)}!`, 'loss');
      bets[i].active = false;
      setBtn(i, 'bet');
      myHistory.unshift({mult: crashPoint, win: -bets[i].amount, amount: bets[i].amount, crashed: true, time: new Date().toLocaleTimeString('pt-BR')});
    }
  }

  // Add to global history
  roundHistory.unshift(crashPoint);
  if(roundHistory.length > 20) roundHistory.pop();
  renderHistoryBar();
  updateHistoryPanel();

  setTimeout(() => startWaiting(), 2000);
}

// ===================== BET BUTTONS =====================
function setBtn(slot, state){
  const btn = document.getElementById('mainBtn'+slot);
  const sub = document.getElementById('btnSub'+slot);
  const amt = parseFloat(document.getElementById('betInput'+slot).value) || 1;
  btn.className = 'main-bet-btn ' + state;

  if(state === 'bet'){
    btn.innerHTML = 'Apostar<span class="btn-sub">'+formatBRL(amt)+'</span>';
    btn.onclick = ()=>handleBetBtn(slot);
  } else if(state === 'cashout'){
    btn.innerHTML = 'Retirar<span class="btn-sub" id="cashSub'+slot+'">'+formatBRL(bets[slot].amount * currentMult)+'</span>';
    btn.onclick = ()=>doCashout(slot);
    // Update cashout value live
    const updateCash = setInterval(()=>{
      if(gameState !== 'flying' || !bets[slot].active){ clearInterval(updateCash); return; }
      const s = document.getElementById('cashSub'+slot);
      if(s) s.textContent = formatBRL(bets[slot].amount * currentMult);
    }, 100);
  } else if(state === 'cancel'){
    btn.innerHTML = 'Cancelar<span class="btn-sub">Aguardando...</span>';
    btn.onclick = ()=>cancelPendingBet(slot);
  } else if(state === 'waiting'){
    btn.innerHTML = 'Aguarde...<span class="btn-sub">Rodada em curso</span>';
    btn.onclick = null;
  }
}

function handleBetBtn(slot){
  const amt = parseFloat(document.getElementById('betInput'+slot).value) || 0;
  if(amt <= 0){ showToast('Valor inválido!', 'loss'); return; }
  if(amt > balance){ showToast('Saldo insuficiente!', 'loss'); return; }

  if(gameState === 'waiting'){
    bets[slot].pendingBet = amt;
    setBtn(slot, 'cancel');
  } else if(gameState === 'flying'){
    showToast('Rodada em andamento!', 'loss');
  } else {
    // crashed — queue for next
    bets[slot].pendingBet = amt;
    setBtn(slot, 'cancel');
  }
}

function cancelPendingBet(slot){
  bets[slot].pendingBet = null;
  setBtn(slot, 'bet');
}

function adjustBet(slot, dir){
  const inp = document.getElementById('betInput'+slot);
  let v = parseFloat(inp.value) || 1;
  v = Math.max(0.5, v + dir * (v < 5 ? 0.5 : v < 20 ? 1 : 5));
  inp.value = v.toFixed(2);
  const sub = document.getElementById('btnSub'+slot);
  if(sub) sub.textContent = formatBRL(v);
}

function setQuick(slot, add){
  const inp = document.getElementById('betInput'+slot);
  let v = parseFloat(inp.value) || 0;
  v = Math.max(0.5, v + add);
  inp.value = v.toFixed(2);
}

function switchTab(slot, mode){
  // Just cosmetic for now, auto cashout row is always visible
  const card = document.getElementById('betCard'+slot);
  const tabs = card.querySelectorAll('.bet-tab');
  tabs.forEach((t,i) => t.classList.toggle('active', (i===0) === (mode==='manual')));
}

// ===================== HISTORY BAR =====================
function getPillClass(m){
  if(m < 2) return 'hist-blue';
  if(m < 10) return 'hist-purple';
  if(m < 100) return 'hist-pink';
  return 'hist-red';
}

function renderHistoryBar(){
  const bar = document.getElementById('historyBar');
  bar.innerHTML = roundHistory.slice(0,15).map(m =>
    `<span class="hist-pill ${getPillClass(m)}">${formatMult(m)}</span>`
  ).join('');
}

function updateHistoryPanel(){
  const body = document.getElementById('historyBody');
  if(!myHistory.length){ body.innerHTML='<div class="empty-rank">Nenhuma rodada ainda.</div>'; return; }
  body.innerHTML = myHistory.slice(0,30).map(h=>`
    <div class="rank-row">
      <span style="font-size:18px">${h.crashed ? '💥' : '✈'}</span>
      <span style="flex:1">
        <div style="font-family:var(--rajdhani);font-size:15px;font-weight:700;color:${h.crashed?'var(--red)':'var(--green)'}">
          ${h.crashed ? 'Perdeu' : 'Ganhou'} — ${formatMult(h.mult)}
        </div>
        <div style="font-size:11px;color:var(--muted)">${h.time} · Aposta: ${formatBRL(h.amount)}</div>
      </span>
      <span style="font-family:var(--rajdhani);font-size:17px;font-weight:700;color:${h.crashed?'var(--red)':'var(--gold)'}">
        ${h.crashed ? '-' : '+'}${formatBRL(Math.abs(h.win))}
      </span>
    </div>
  `).join('');
}

// ===================== RANKING =====================
let pendingScore = null;

function checkRanking(winAmount, mult, betAmount){
  const rankRef = window._fbRef(window._fbDb, 'aviator_ranking');
  window._fbGet(window._fbQuery(rankRef, window._fbOrderByChild('amount'), window._fbLimitToLast(10))).then(snap => {
    const entries = [];
    snap.forEach(child => entries.push({...child.val(), key: child.key}));
    const minAmount = entries.length < 10 ? 0 : Math.min(...entries.map(e=>e.amount));
    if(winAmount > minAmount){
      pendingScore = {amount: winAmount, mult: parseFloat(mult.toFixed(2)), bet: betAmount};
      document.getElementById('nameInput').value = '';
      document.getElementById('nameModal').classList.add('show');
    }
  }).catch(()=>{
    // Fallback local
    const local = JSON.parse(localStorage.getItem('av_local_rank') || '[]');
    const min = local.length < 10 ? 0 : Math.min(...local.map(e=>e.amount));
    if(winAmount > min){
      pendingScore = {amount: winAmount, mult: parseFloat(mult.toFixed(2)), bet: betAmount};
      document.getElementById('nameInput').value = '';
      document.getElementById('nameModal').classList.add('show');
    }
  });
}

function submitScore(){
  const name = document.getElementById('nameInput').value.trim().toUpperCase().slice(0,5);
  if(!name || name.length < 1){ showToast('Digite um nome!', 'loss'); return; }
  if(!pendingScore) return;
  document.getElementById('nameModal').classList.remove('show');

  const entry = {name, amount: pendingScore.amount, mult: pendingScore.mult, bet: pendingScore.bet, ts: Date.now()};

  if(window._fbReady){
    const rankRef = window._fbRef(window._fbDb, 'aviator_ranking');
    window._fbPush(rankRef, entry).then(()=>{
      showToast('🏆 Salvo no ranking!', 'win');
      loadRanking();
      // Trim to top 10
      trimRanking();
    });
  } else {
    const local = JSON.parse(localStorage.getItem('av_local_rank') || '[]');
    local.push(entry);
    local.sort((a,b)=>b.amount-a.amount);
    localStorage.setItem('av_local_rank', JSON.stringify(local.slice(0,10)));
    showToast('🏆 Salvo localmente!', 'win');
  }
  pendingScore = null;
}

function trimRanking(){
  if(!window._fbReady) return;
  const rankRef = window._fbRef(window._fbDb, 'aviator_ranking');
  window._fbGet(window._fbQuery(rankRef, window._fbOrderByChild('amount'))).then(snap=>{
    const all = [];
    snap.forEach(c=>all.push({key:c.key,...c.val()}));
    if(all.length > 10){
      all.sort((a,b)=>a.amount-b.amount);
      const toDelete = all.slice(0, all.length-10);
      toDelete.forEach(e=>{
        window._fbSet(window._fbRef(window._fbDb,'aviator_ranking/'+e.key), null);
      });
    }
  });
}

function loadRanking(){
  const body = document.getElementById('rankingBody');
  if(window._fbReady){
    const rankRef = window._fbRef(window._fbDb, 'aviator_ranking');
    window._fbGet(window._fbQuery(rankRef, window._fbOrderByChild('amount'), window._fbLimitToLast(10))).then(snap=>{
      const entries = [];
      snap.forEach(c=>entries.push(c.val()));
      entries.sort((a,b)=>b.amount-a.amount);
      renderRanking(entries);
    }).catch(()=>renderRankingLocal());
  } else {
    renderRankingLocal();
  }
}

function renderRankingLocal(){
  const local = JSON.parse(localStorage.getItem('av_local_rank') || '[]');
  local.sort((a,b)=>b.amount-a.amount);
  renderRanking(local);
}

function renderRanking(entries){
  const body = document.getElementById('rankingBody');
  if(!entries.length){ body.innerHTML='<div class="empty-rank">Nenhum registro ainda.<br>Seja o primeiro! 🚀</div>'; return; }
  const medals = ['gold','silver','bronze'];
  body.innerHTML = entries.slice(0,10).map((e,i)=>`
    <div class="rank-row">
      <span class="rank-pos ${medals[i]||''}">${i+1}</span>
      <span class="rank-name">${e.name}</span>
      <span class="rank-val">
        <div class="rank-mult">${e.mult}x · R$${e.bet?.toFixed(2)||'?'}</div>
        <div class="rank-amount">${formatBRL(e.amount)}</div>
      </span>
    </div>
  `).join('');
}

// ===================== PANELS =====================
function openPanel(name){
  document.querySelectorAll('.bottom-panel').forEach(p=>p.classList.remove('open'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));

  if(name === 'game'){
    document.querySelector('.nav-tab:nth-child(1)').classList.add('active');
    return;
  }
  if(name === 'ranking'){
    document.getElementById('rankingPanel').classList.add('open');
    document.querySelector('.nav-tab:nth-child(2)').classList.add('active');
    loadRanking();
  }
  if(name === 'history'){
    document.getElementById('historyPanel').classList.add('open');
    document.querySelector('.nav-tab:nth-child(3)').classList.add('active');
    updateHistoryPanel();
  }
}
function closePanel(name){
  document.getElementById(name+'Panel').classList.remove('open');
  document.querySelector('.nav-tab:nth-child(1)').classList.add('active');
}

// ===================== TOAST =====================
function showToast(msg, type=''){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ===================== MODAL CLOSE ON BACKDROP =====================
document.getElementById('nameModal').addEventListener('click', function(e){
  if(e.target === this) this.classList.remove('show');
});
document.getElementById('nameInput').addEventListener('keyup', function(e){
  if(e.key === 'Enter') submitScore();
  this.value = this.value.toUpperCase();
});

// ===================== INPUT LISTENERS =====================
[1,2].forEach(slot=>{
  document.getElementById('betInput'+slot).addEventListener('input', function(){
    const v = parseFloat(this.value) || 0;
    const sub = document.getElementById('btnSub'+slot);
    if(sub && document.getElementById('mainBtn'+slot).classList.contains('bet')) sub.textContent = formatBRL(v);
  });
});

// ===================== INIT =====================
document.addEventListener('fbReady', ()=>{ loadRanking(); });

// Seed some fake history for feel
(function seedHistory(){
  const seeds = [2.31,1.51,1.60,1.33,1.11,1.68,5.59,1.05,3.22,12.4,1.07,2.88,1.02,7.50,1.14,25.3,1.03,1.91,100.2,1.08];
  roundHistory = seeds;
  renderHistoryBar();
})();

updateBalance();
setTimeout(()=>startWaiting(), 500);
</script>
